name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'ARCHITECTURE.md'
      - 'MERMEDA.md'
      - 'SPARK.md'
      - 'docs/**'
  workflow_dispatch: {}

jobs:
  build-docs:
    name: Build docs suite
    runs-on: [self-hosted, doctor-docs]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: path/to/docs/output
